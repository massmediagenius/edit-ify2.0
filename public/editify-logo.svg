<svg width="520" height="160" viewBox="0 0 520 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="cyanGradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon: stylized play/edit mark -->
  <g filter="url(#glow)">
    <!-- Rounded square frame -->
    <rect x="20" y="38" width="84" height="84" rx="22" fill="none" stroke="url(#cyanGrad)" stroke-width="6"/>
    <!-- Play triangle (editing/timeline cue) -->
    <path d="M52 60 L84 80 L52 100 Z" fill="url(#cyanGradLight)"/>
    <!-- Scrub line accent -->
    <line x1="34" y1="80" x2="44" y2="80" stroke="#67e8f9" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="700">
    <text x="124" y="96" font-size="56" fill="#e8fbff">Edit</text>
    <text x="247" y="96" font-size="56" fill="url(#cyanGrad)">-ify</text>
  </g>

  <!-- Underline accent -->
  <rect x="124" y="108" width="208" height="4" rx="2" fill="url(#cyanGrad)" opacity="0.8"/>
</svg>
